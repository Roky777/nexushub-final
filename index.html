<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>NexusHub</title>

    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/home.css" />
  </head>

  <body>
    <!-- Skip Link -->
    <a href="#main-content" class="skip-link"> Skip to main content </a>

    <!-- Header -->
    <header class="header">
      <button
        id="menu-btn"
        class="menu-btn"
        type="button"
        aria-label="Open Navigation Menu"
        aria-expanded="false"
        aria-controls="sidebar">
        ☰
      </button>

      <div class="logo-container">
        <img
          src="./assets/images/nexushub-logo.png"
          alt="NexusHub Logo"
          class="logo" />

        <div class="logo-text">
          <h1>NexusHub</h1>
          <p>One Dashboard. Six Powerful Tools.</p>
        </div>
      </div>
    </header>

    <!-- Dashboard -->
    <div class="dashboard">
      <!-- Sidebar -->
      <nav id="sidebar" class="sidebar" aria-label="Dashboard Navigation">
        <!-- Navigation -->
        <div class="nav-group">
          <button
            class="nav-btn active"
            data-view="home"
            aria-current="page"
            type="button">
            <i data-lucide="house"></i>
            <span>Home</span>
          </button>

          <button class="nav-btn" data-view="quiz" type="button">
            <i data-lucide="brain"></i>
            <span>Quiz</span>
          </button>

          <button class="nav-btn" data-view="expense" type="button">
            <i data-lucide="wallet"></i>
            <span>Expense</span>
          </button>

          <button class="nav-btn" data-view="news" type="button">
            <i data-lucide="newspaper"></i>
            <span>News</span>
          </button>

          <button class="nav-btn" data-view="github" type="button">
            <i data-lucide="folder-git-2"></i>
            <span>GitHub</span>
          </button>

          <button class="nav-btn" data-view="kanban" type="button">
            <i data-lucide="kanban-square"></i>
            <span>Kanban</span>
          </button>
        </div>

        <!-- Team Profile -->
        <div class="sidebar-profile">
          <div class="avatar">TN</div>

          <div class="profile-info">
            <h3>Team Nexus</h3>
            <p>Capstone Project</p>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <main id="main-content" class="content">
        <!-- HOME -->
        <section id="home" class="view active-view" tabindex="-1">
          <div class="home-hero">
            <h2>Welcome Back 👋</h2>

            <p>
              NexusHub brings together six powerful productivity tools into one
              unified workspace.
            </p>
          </div>

          <div class="stats-grid">
            <div class="card">
              <h3>Projects</h3>
              <div class="number">6</div>
            </div>

            <div class="card">
              <h3>Team Members</h3>
              <div class="number">6</div>
            </div>

            <div class="card">
              <h3>Modules</h3>
              <div class="number">6</div>
            </div>

            <div class="card">
              <h3>Status</h3>
              <div class="number">Active</div>
            </div>
          </div>
        </section>

        <!-- QUIZ_PLACEHOLDER -->

        <!-- EXPENSE_PLACEHOLDER -->

        <!-- NEWS_PLACEHOLDER -->

        <!-- GITHUB_PLACEHOLDER -->

        <!-- KANBAN_PLACEHOLDER -->
      </main>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
